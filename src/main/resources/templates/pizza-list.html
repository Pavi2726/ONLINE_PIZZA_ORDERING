<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Menu')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<section class="container my-5">
    <div class="mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-pizza"></i> Our Menu</h2>
    </div>

    <!-- Search / Filter / Sort -->
    <form th:action="@{/pizzas}" method="get" class="row g-2 align-items-end mb-4 p-3 bg-light rounded">
        <div class="col-12 col-md-5">
            <label class="form-label small fw-semibold">Search by name</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" name="search" class="form-control"
                       th:value="${search}" placeholder="e.g. Margherita">
            </div>
        </div>
        <div class="col-6 col-md-3">
            <label class="form-label small fw-semibold">Category</label>
            <select name="category" class="form-select">
                <option value="">All categories</option>
                <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"
                        th:selected="${cat == selectedCategory}"></option>
            </select>
        </div>
        <div class="col-6 col-md-2">
            <label class="form-label small fw-semibold">Sort by price</label>
            <select name="sort" class="form-select">
                <option value="">Default</option>
                <option value="priceAsc" th:selected="${sort == 'priceAsc'}">Low &rarr; High</option>
                <option value="priceDesc" th:selected="${sort == 'priceDesc'}">High &rarr; Low</option>
            </select>
        </div>
        <div class="col-12 col-md-2 d-grid">
            <button type="submit" class="btn btn-danger"><i class="bi bi-funnel"></i> Apply</button>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(pizzas)}" class="text-center text-muted py-5">
        <i class="bi bi-search fs-1"></i>
        <p class="mt-2">No pizzas match your search.</p>
    </div>

    <!-- Cards -->
    <div class="row g-4" id="pizzaGrid">
        <div class="col-12 col-sm-6 col-lg-4 col-xl-3 pizza-card-col" th:each="pizza : ${pizzas}">
            <div class="card h-100 pizza-card shadow-sm">
                <div class="position-relative">
                    <img th:src="${pizza.imageUrl}" class="card-img-top pizza-img"
                         th:alt="${pizza.name}"
                         onerror="this.src='https://via.placeholder.com/400x250?text=Pizza';">
                    <span class="badge position-absolute top-0 end-0 m-2"
                          th:classappend="${pizza.available} ? 'bg-success' : 'bg-secondary'"
                          th:text="${pizza.available} ? 'Available' : 'Unavailable'">Available</span>
                </div>
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start">
                        <h5 class="card-title fw-semibold mb-1" th:text="${pizza.name}">Pizza</h5>
                        <span class="badge bg-light text-dark border" th:text="${pizza.category}">Category</span>
                    </div>
                    <p class="card-text small text-muted flex-grow-1"
                       th:text="${pizza.description}">Description</p>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <span class="fs-5 fw-bold text-danger"
                              th:text="'₹' + ${#numbers.formatInteger(pizza.price, 1)}">₹0</span>
                        <a th:if="${pizza.available}" th:href="@{/orders/new(pizzaId=${pizza.id})}"
                           class="btn btn-sm btn-danger"><i class="bi bi-bag-plus"></i> Order</a>
                        <button th:unless="${pizza.available}" class="btn btn-sm btn-secondary" disabled>
                            Unavailable</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav th:if="${!#lists.isEmpty(pizzas)}" class="mt-4">
        <ul class="pagination justify-content-center" id="customerPagination"></ul>
    </nav>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
