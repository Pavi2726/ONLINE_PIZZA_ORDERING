<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head('Dashboard')}"></head>
<body class="admin-body">
<nav th:replace="~{fragments/admin-layout :: topbar}"></nav>

<!-- Mobile sidebar -->
<div class="offcanvas offcanvas-start admin-sidebar" tabindex="-1" id="adminSidebar">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">Menu</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <div th:replace="~{fragments/admin-layout :: sidebarLinks('dashboard')}"></div>
    </div>
</div>

<div class="container-fluid">
    <div class="row">
        <!-- Desktop sidebar -->
        <aside class="col-lg-2 d-none d-lg-block admin-sidebar py-3">
            <div th:replace="~{fragments/admin-layout :: sidebarLinks('dashboard')}"></div>
        </aside>

        <!-- Content -->
        <main class="col-lg-10 p-4">
            <div th:replace="~{fragments/admin-layout :: alerts}"></div>

            <h2 class="fw-bold mb-4"><i class="bi bi-speedometer2"></i> Dashboard</h2>

            <div class="row g-4 mb-4">
                <div class="col-12 col-md-4">
                    <div class="card stat-card border-0 shadow-sm text-white bg-primary">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <div class="small text-uppercase">Total Pizzas</div>
                                <div class="display-6 fw-bold" th:text="${totalPizzas}">0</div>
                            </div>
                            <i class="bi bi-pizza fs-1 opacity-50"></i>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="card stat-card border-0 shadow-sm text-white bg-success">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <div class="small text-uppercase">Available</div>
                                <div class="display-6 fw-bold" th:text="${availablePizzas}">0</div>
                            </div>
                            <i class="bi bi-check-circle fs-1 opacity-50"></i>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="card stat-card border-0 shadow-sm text-white bg-secondary">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <div class="small text-uppercase">Out of Stock</div>
                                <div class="display-6 fw-bold" th:text="${outOfStockPizzas}">0</div>
                            </div>
                            <i class="bi bi-x-circle fs-1 opacity-50"></i>
                        </div>
                    </div>
                </div>
            </div>

            <h5 class="fw-semibold mb-3">Quick Actions</h5>
            <div class="d-flex flex-wrap gap-2">
                <a th:href="@{/admin/pizzas/add}" class="btn btn-danger">
                    <i class="bi bi-plus-circle"></i> Add Pizza</a>
                <a th:href="@{/admin/pizzas}" class="btn btn-outline-danger">
                    <i class="bi bi-card-list"></i> View Pizza List</a>
                <a th:href="@{/admin/logout}" class="btn btn-outline-secondary">
                    <i class="bi bi-box-arrow-right"></i> Logout</a>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/admin-layout :: scripts}"></div>
</body>
</html>
