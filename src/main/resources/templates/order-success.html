<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Order Confirmed')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-7">
            <div class="card shadow-sm text-center">
                <div class="card-body p-4 p-md-5">
                    <i class="bi bi-check-circle-fill text-success" style="font-size:4rem;"></i>
                    <h2 class="fw-bold mt-3">Thank You for Your Order!</h2>
                    <p class="text-muted">Your delicious pizza is on its way to being prepared.</p>
<div class="text-start bg-light rounded p-4 mt-4">

    <div class="row mb-2">
        <div class="col-6 text-muted">Order Number</div>
        <div class="col-6 text-end fw-bold" th:text="${order.orderNumber}"></div>
    </div>

    <hr>

    <h5 class="mb-3">Ordered Items</h5>

    <table class="table table-bordered">
        <thead class="table-light">
        <tr>
            <th>Pizza</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="item : ${order.orderItems}">
            <td th:text="${item.pizza.name}"></td>
            <td th:text="${item.quantity}"></td>
            <td>₹<span th:text="${item.price}"></span></td>
            <td>₹<span th:text="${item.lineTotal}"></span></td>
        </tr>
        </tbody>
    </table>

    <div class="row mb-2">
        <div class="col-6 text-muted">Subtotal</div>
        <div class="col-6 text-end">
            ₹<span th:text="${order.subtotal}"></span>
        </div>
    </div>

    <div class="row mb-2" th:if="${order.discountAmount != null}">
        <div class="col-6 text-muted">Discount</div>
        <div class="col-6 text-end text-success">
            -₹<span th:text="${order.discountAmount}"></span>
        </div>
    </div>

    <div class="row mb-2">
        <div class="col-6 text-muted">Tax</div>
        <div class="col-6 text-end">
            ₹<span th:text="${order.tax}"></span>
        </div>
    </div>

    <div class="row mb-2 fw-bold">
        <div class="col-6">Grand Total</div>
        <div class="col-6 text-end text-danger">
            ₹<span th:text="${order.totalAmount}"></span>
        </div>
    </div>

    <hr>

    <div class="row mb-2">
        <div class="col-6 text-muted">Customer</div>
        <div class="col-6 text-end" th:text="${order.customer.fullName}"></div>
    </div>

    <div class="row mb-2">
        <div class="col-6 text-muted">Delivery Address</div>
        <div class="col-6 text-end" th:text="${order.deliveryAddress}"></div>
    </div>

    <div class="row mb-2">
        <div class="col-6 text-muted">Status</div>
        <div class="col-6 text-end">
            <span class="badge bg-warning text-dark"
                  th:text="${order.status}"></span>
        </div>
    </div>

                        <div class="row">
    <div class="col-6 text-muted">Order Date</div>
    <div class="col-6 text-end"
         th:text="${#temporals.format(
             order.updatedAt != null ? order.updatedAt : order.createdAt,
             'dd MMM yyyy, HH:mm')}">
        date
    </div>
</div>
</div>

                    <div class="d-flex gap-2 justify-content-center mt-4">
                        <a th:href="@{/pizzas}" class="btn btn-danger"><i class="bi bi-list-ul"></i> Order More</a>
                        <a th:href="@{/}" class="btn btn-outline-secondary"><i class="bi bi-house"></i> Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
