<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Home')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<!-- Hero -->
<header class="hero text-white text-center d-flex align-items-center">
    <div class="container py-5">
        <h1 class="display-3 fw-bold mb-3">Hot, Fresh &amp; Delicious</h1>
        <p class="lead mb-4">Handcrafted pizzas baked to perfection and delivered to your door.</p>
        <a th:href="@{/pizzas}" class="btn btn-warning btn-lg px-4 fw-semibold">
            <i class="bi bi-list-ul"></i> Browse Our Menu
        </a>
    </div>
</header>

<!-- Featured -->
<section class="container my-5">
    <div class="text-center mb-4">
        <h2 class="fw-bold">Featured Pizzas</h2>
        <p class="text-muted">A taste of what's on the menu</p>
    </div>

    <div th:if="${#lists.isEmpty(featuredPizzas)}" class="text-center text-muted py-4">
        <i class="bi bi-emoji-frown fs-1"></i>
        <p class="mt-2">No pizzas available yet. Please check back soon!</p>
    </div>

    <div class="row g-4">
        <div class="col-12 col-sm-6 col-lg-3" th:each="pizza : ${featuredPizzas}">
            <div class="card h-100 pizza-card shadow-sm">
                <img th:src="${pizza.imageUrl}" class="card-img-top pizza-img"
                     th:alt="${pizza.name}"
                     onerror="this.src='https://via.placeholder.com/400x250?text=Pizza';">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-semibold" th:text="${pizza.name}">Pizza</h5>
                    <p class="card-text small text-muted flex-grow-1"
                       th:text="${#strings.abbreviate(pizza.description, 70)}">Description</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold text-danger"
                              th:text="'₹' + ${#numbers.formatInteger(pizza.price, 1)}">₹0</span>
                        <a th:href="@{/orders/new(pizzaId=${pizza.id})}" class="btn btn-sm btn-danger">
                            <i class="bi bi-bag-plus"></i> Order
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-4">
        <a th:href="@{/pizzas}" class="btn btn-outline-danger">View Full Menu <i class="bi bi-arrow-right"></i></a>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
