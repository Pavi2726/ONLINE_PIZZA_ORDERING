<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Error')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-6 text-center">
            <div class="card shadow-sm">
                <div class="card-body p-5">
                    <i class="bi bi-exclamation-octagon-fill text-danger" style="font-size:4rem;"></i>
                    <h1 class="fw-bold mt-3" th:text="${statusCode} ?: 'Error'">500</h1>
                    <h4 class="text-muted" th:text="${statusText} ?: 'Something went wrong'">Error</h4>
                    <p class="mt-3" th:text="${message} ?: 'An unexpected error occurred. Please try again.'">
                        An unexpected error occurred.</p>
                    <a th:href="@{/}" class="btn btn-danger mt-2">
                        <i class="bi bi-house"></i> Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
