<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Order</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-lg-10">

            <div class="card shadow">

                <div class="card-header bg-warning">
                    <h3 class="mb-0">Edit Order</h3>
                </div>

                <div class="card-body">
                  
                    <div class="mb-4">
                        <h5>
                            Order Number :
                            <span th:text="${order.orderNumber}"></span>
                        </h5>

                        <p class="mb-1">
                            <strong>Status:</strong>
                            <span th:text="${order.status}"></span>
                        </p>

                        <p class="mb-0">
                            <strong>Order Date:</strong>
                            <span th:text="${#temporals.format(order.createdAt,'dd MMM yyyy HH:mm')}"></span>
                        </p>
                    </div>

                    <table class="table table-bordered table-hover align-middle">

                        <thead class="table-dark">
                        <tr>
                            <th>Pizza</th>
                            <th class="text-center">Quantity</th>
                            <th class="text-end">Price</th>
                            <th class="text-end">Line Total</th>
                            <th class="text-center">Action</th>
                        </tr>
                        </thead>

                        

                        <tbody>

<tr th:each="item : ${order.orderItems}">

    <td th:text="${item.pizza.name}"></td>

    <td class="text-center">

        <div class="d-flex justify-content-center align-items-center gap-2">

            <!-- Decrease -->
            <form class="edit-action-form"
      th:action="@{/orders/edit/{orderId}/decrease/{itemId}
      (orderId=${order.id},itemId=${item.id})}"
      method="post">

    <input type="hidden" name="deliveryAddress">
    <input type="hidden" name="phone">

                <button class="btn btn-outline-secondary btn-sm"
                        type="submit">
                    −
                </button>

            </form>

            <span class="fw-bold"
                  th:text="${item.quantity}">
            </span>

            <!-- Increase -->
            <form class="edit-action-form"
      th:action="@{/orders/edit/{orderId}/increase/{itemId}
      (orderId=${order.id},itemId=${item.id})}"
      method="post">

    <input type="hidden" name="deliveryAddress">
    <input type="hidden" name="phone">

                <button class="btn btn-outline-success btn-sm"
                        type="submit">
                    +
                </button>

            </form>

        </div>

    </td>

    <td class="text-end">
        ₹<span th:text="${#numbers.formatDecimal(item.price,1,2)}"></span>
    </td>

    <td class="text-end">
        ₹<span th:text="${#numbers.formatDecimal(item.lineTotal,1,2)}"></span>
    </td>

    <td class="text-center">

        <form class="edit-action-form"
      th:action="@{/orders/edit/{orderId}/remove/{itemId}
      (orderId=${order.id},itemId=${item.id})}"
      method="post">

    <input type="hidden" name="deliveryAddress">
    <input type="hidden" name="phone">

            <button class="btn btn-outline-danger btn-sm"
                    type="submit"
                    onclick="return confirm('Remove this pizza from the order?');">

                Remove

            </button>

        </form>

    </td>

</tr>

</tbody>

                    </table>
                    <form th:action="@{/orders/edit/{orderId}(orderId=${order.id})}"
      method="post">

<div class="row mt-4">

    <div class="col-md-6">
        <label class="form-label">Delivery Address</label>

        <textarea class="form-control"
          id="deliveryAddress"
          name="deliveryAddress"
          rows="3"
          th:text="${order.deliveryAddress}">
</textarea>
    </div>

    <div class="col-md-6">
        <label class="form-label">Phone</label>

        <input type="text"
       class="form-control"
       id="phone"
       name="phone"
       th:value="${order.phone}">
    </div>

</div>
                    <div class="row justify-content-end">

                        <div class="col-md-5">

                            <table class="table">

                                <tr>
                                    <th>Subtotal</th>
                                    <td class="text-end">
                                        ₹<span th:text="${order.subtotal}"></span>
                                    </td>
                                </tr>

                                <tr>
                                    <th>Discount</th>
                                    <td class="text-end text-success">
                                        - ₹<span th:text="${order.discountAmount}"></span>
                                    </td>
                                </tr>

                                <tr>
                                    <th>Tax</th>
                                    <td class="text-end">
                                        ₹<span th:text="${order.tax}"></span>
                                    </td>
                                </tr>

                                <tr class="table-warning">
                                    <th>Grand Total</th>
                                    <th class="text-end">
                                        ₹<span th:text="${order.totalAmount}"></span>
                                    </th>
                                </tr>

                            </table>

                        </div>

                    </div>

                    <div class="d-flex justify-content-between mt-4">

                        <a th:href="@{/orders/history}"
                           class="btn btn-secondary">
                            Back
                        </a>

                        <div class="mt-4 d-flex gap-2">

    <a th:href="@{/pizzas(orderId=${order.id})}"
   class="btn btn-primary">
    🍕 Add More Pizzas
</a>

    <button type="submit"
            class="btn btn-success">
        Update Order
    </button>

</div>
   </div>
</form>

                </div>

            </div>

        </div>
    </div>

</div>
<script>
document.querySelectorAll(".edit-action-form").forEach(form => {

    form.addEventListener("submit", function () {

        this.querySelector("input[name='deliveryAddress']").value =
            document.getElementById("deliveryAddress").value;

        this.querySelector("input[name='phone']").value =
            document.getElementById("phone").value;

    });

});
</script>
</body>
</html>
