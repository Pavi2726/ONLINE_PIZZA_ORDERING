<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Edit Order')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<section class="container my-5">
    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-sm">

                <div class="card-header bg-warning text-dark">
                    <h3 class="mb-0">
                        <i class="bi bi-pencil-square"></i>
                        Edit Order
                    </h3>
                </div>

                <div class="card-body">

                    <form th:action="@{/orders/update/{id}(id=${order.id})}"
                          th:object="${orderDTO}"
                          method="post">

                        <input type="hidden" th:field="*{pizzaId}"/>

                        <!-- Pizza -->
                        <div class="mb-3">
                            <label class="form-label">Pizza</label>
                            <input class="form-control"
                                   th:value="${order.pizza.name}"
                                   readonly>
                        </div>

                        <!-- Coupon -->
                        <div class="mb-3">
                            <label class="form-label">Coupon</label>

                            <input class="form-control"
                                   th:value="${order.couponCode != null ? order.couponCode : 'No Coupon Applied'}"
                                   readonly>
                        </div>

                        <!-- Quantity -->
                        <div class="mb-3">
                            <label class="form-label">Quantity</label>

                            <input type="number"
                                   class="form-control"
                                   min="1"
                                   max="50"
                                   th:field="*{quantity}">

                            <div class="text-danger"
                                 th:errors="*{quantity}">
                            </div>
                        </div>

                        <!-- Address -->
                        <div class="mb-3">

                            <label class="form-label">
                                Delivery Address
                            </label>

                            <textarea class="form-control"
                                      rows="3"
                                      th:field="*{deliveryAddress}">
                            </textarea>

                            <div class="text-danger"
                                 th:errors="*{deliveryAddress}">
                            </div>

                        </div>

                        <!-- Phone -->
                        <div class="mb-3">

                            <label class="form-label">
                                Phone
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{phone}">

                            <div class="text-danger"
                                 th:errors="*{phone}">
                            </div>

                        </div>

                        <!-- Current Total -->
                        <div class="alert alert-info">

                            <strong>Current Total:</strong>

                            ₹
                            <span th:text="${#numbers.formatDecimal(order.totalAmount,1,2)}"></span>

                        </div>

                        <div class="d-flex justify-content-between">

                            <a th:href="@{/orders/history}"
                               class="btn btn-secondary">
                                Back
                            </a>

                            <button class="btn btn-warning"
                                    type="submit">

                                <i class="bi bi-check-circle"></i>

                                Update Order

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
