<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head('Manage Pizzas')}"></head>
<body class="admin-body">
<nav th:replace="~{fragments/admin-layout :: topbar}"></nav>

<div class="offcanvas offcanvas-start admin-sidebar" tabindex="-1" id="adminSidebar">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">Menu</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <div th:replace="~{fragments/admin-layout :: sidebarLinks('manage')}"></div>
    </div>
</div>

<div class="container-fluid">
    <div class="row">
        <aside class="col-lg-2 d-none d-lg-block admin-sidebar py-3">
            <div th:replace="~{fragments/admin-layout :: sidebarLinks('manage')}"></div>
        </aside>

        <main class="col-lg-10 p-4">
            <div th:replace="~{fragments/admin-layout :: alerts}"></div>

            <div class="d-flex justify-content-between align-items-center flex-wrap mb-4">
                <h2 class="fw-bold mb-0"><i class="bi bi-card-list"></i> Manage Pizzas</h2>
                <a th:href="@{/admin/pizzas/add}" class="btn btn-danger">
                    <i class="bi bi-plus-circle"></i> Add Pizza</a>
            </div>

            <!-- Search / Filter -->
            <form th:action="@{/admin/pizzas}" method="get" class="row g-2 align-items-end mb-3 p-3 bg-light rounded">
                <div class="col-12 col-md-6">
                    <label class="form-label small fw-semibold">Search by name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" name="search" class="form-control" th:value="${search}"
                               placeholder="e.g. Margherita">
                    </div>
                </div>
                <div class="col-8 col-md-4">
                    <label class="form-label small fw-semibold">Category</label>
                    <select name="category" class="form-select">
                        <option value="">All categories</option>
                        <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"
                                th:selected="${cat == selectedCategory}"></option>
                    </select>
                </div>
                <div class="col-4 col-md-2 d-grid">
                    <button type="submit" class="btn btn-danger"><i class="bi bi-funnel"></i> Filter</button>
                </div>
            </form>

            <div th:if="${#lists.isEmpty(pizzas)}" class="text-center text-muted py-5">
                <i class="bi bi-inbox fs-1"></i>
                <p class="mt-2">No pizzas found.</p>
            </div>

            <!-- Table -->
            <div class="table-responsive" th:unless="${#lists.isEmpty(pizzas)}">
                <table class="table table-hover align-middle bg-white shadow-sm rounded" id="pizzaTable">
                    <thead class="table-dark">
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="pizza : ${pizzas}" class="pizza-row">
                        <td>
                            <img th:src="${pizza.imageUrl}" class="admin-thumb" th:alt="${pizza.name}"
                                 onerror="this.src='https://via.placeholder.com/60?text=Pizza';">
                        </td>
                        <td class="fw-semibold" th:text="${pizza.name}">Name</td>
                        <td><span class="badge bg-light text-dark border" th:text="${pizza.category}">Category</span></td>
                        <td th:text="'₹' + ${#numbers.formatDecimal(pizza.price, 1, 2)}">₹0.00</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${pizza.available} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${pizza.available} ? 'Available' : 'Out of Stock'">Status</span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/admin/pizzas/edit/{id}(id=${pizza.id})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-pencil"></i> Edit</a>
                            <form th:action="@{/admin/pizzas/delete/{id}(id=${pizza.id})}" method="post"
                                  class="d-inline"
                                  onsubmit="return confirm('Are you sure you want to delete this pizza? This will also remove its image.');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i> Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <!-- Client-side pagination -->
                <nav th:if="${#lists.size(pizzas) > 0}">
                    <ul class="pagination justify-content-center" id="pagination"></ul>
                </nav>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/admin-layout :: scripts}"></div>
<script th:src="@{/js/admin-table.js}"></script>
</body>
</html>
