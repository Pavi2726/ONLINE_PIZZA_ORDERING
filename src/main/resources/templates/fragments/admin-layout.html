<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ? ${title} + ' | Admin' : 'Admin'">Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<!-- ===================== ADMIN TOPBAR ===================== -->
<nav th:fragment="topbar" class="navbar navbar-dark admin-topbar sticky-top px-3">
    <button class="btn btn-outline-light btn-sm d-lg-none" type="button"
            data-bs-toggle="offcanvas" data-bs-target="#adminSidebar">
        <i class="bi bi-list"></i>
    </button>
    <span class="navbar-brand fw-bold mb-0"><i class="bi bi-shield-lock"></i> Pizza Palace Admin</span>
    <div class="ms-auto d-flex align-items-center gap-3">
        <span class="text-white-50 small d-none d-sm-inline" th:if="${currentAdmin}">
            <i class="bi bi-person-circle"></i> <span th:text="${currentAdmin.name}">Admin</span>
        </span>
        <a th:href="@{/admin/logout}" class="btn btn-sm btn-light">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </div>
</nav>

<!-- ===================== SIDEBAR (links fragment) ===================== -->
<ul th:fragment="sidebarLinks(active)" class="nav flex-column admin-nav">
    <li class="nav-item">
        <a class="nav-link" th:classappend="${active == 'dashboard'} ? 'active'"
           th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" th:classappend="${active == 'add'} ? 'active'"
           th:href="@{/admin/pizzas/add}"><i class="bi bi-plus-circle"></i> Add Pizza</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" th:classappend="${active == 'manage'} ? 'active'"
           th:href="@{/admin/pizzas}"><i class="bi bi-card-list"></i> Manage Pizzas</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" th:classappend="${active == 'coupons'} ? 'active'"
           th:href="@{/admin/coupons}"><i class="bi bi-ticket-perforated"></i> Manage Coupons</a>
    </li>
    <li class="nav-item mt-2">
        <a class="nav-link text-warning" th:href="@{/admin/logout}">
            <i class="bi bi-box-arrow-right"></i> Logout</a>
    </li>
</ul>

<!-- ===================== ALERTS ===================== -->
<div th:fragment="alerts">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>

<!-- ===================== SCRIPTS ===================== -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</div>

</body>
</html>
