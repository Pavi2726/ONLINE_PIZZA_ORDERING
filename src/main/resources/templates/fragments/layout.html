<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ? ${title} + ' | Pizza Palace' : 'Pizza Palace'">Pizza Palace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<!-- ============================= NAVBAR ============================= -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark sticky-top app-navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-pizza-fill"></i> Pizza Palace
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#mainNav" aria-controls="mainNav"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"><i class="bi bi-house-door"></i> Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/pizzas}"><i class="bi bi-list-ul"></i> Pizzas</a>
                </li>
               
                <li class="nav-item" th:if="${currentCustomer}">
                    <a class="nav-link" th:href="@{/cart}"><i class="bi bi-cart3"></i> Cart</a>
                </li>
                <li class="nav-item" th:if="${currentCustomer}">
                    <a class="nav-link" th:href="@{/orders/history}"><i class="bi bi-clock-history"></i> Order History</a>
                </li>
                <li class="nav-item" th:unless="${currentCustomer}">
                    <a class="nav-link" th:href="@{/login}"><i class="bi bi-box-arrow-in-right"></i> Login</a>
                </li>
                <li class="nav-item" th:unless="${currentCustomer}">
                    <a class="nav-link" th:href="@{/register}"><i class="bi bi-person-plus"></i> Register</a>
                </li>
                <li class="nav-item dropdown" th:if="${currentCustomer}">
                    <a class="nav-link dropdown-toggle" href="#" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle"></i>
                        <span th:text="${currentCustomer.firstName}">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/logout}">
                            <i class="bi bi-box-arrow-right"></i> Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ============================= ALERTS ============================= -->
<div th:fragment="alerts" class="container mt-3">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${warningMessage}" class="alert alert-warning alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-circle-fill"></i> <span th:text="${warningMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>

<!-- ============================= FOOTER ============================= -->
<footer th:fragment="footer" class="app-footer mt-5 py-4">
    <div class="container text-center">
        <p class="mb-1"><i class="bi bi-pizza-fill"></i> <strong>Pizza Palace</strong></p>
        <p class="mb-1 small">Freshly baked, delivered hot to your door.</p>
        <p class="mb-0 small text-muted">&copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span> Pizza Palace. All rights reserved.</p>
    </div>
</footer>

<!-- ========================== SCRIPTS ============================= -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</div>

</body>
</html>
