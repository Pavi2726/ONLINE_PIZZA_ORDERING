<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Shopping Cart')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<section class="container my-5">

    <h2 class="fw-bold mb-4">
        <i class="bi bi-cart"></i> Shopping Cart
    </h2>

    <div th:if="${#lists.isEmpty(cart.cartItems)}" class="alert alert-info">
        Your cart is empty.
    </div>

    <table class="table table-bordered align-middle"
           th:if="${!#lists.isEmpty(cart.cartItems)}">

        <thead class="table-dark">
        <tr>
            <th>Pizza</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="item : ${cart.cartItems}">

            <td th:text="${item.pizza.name}"></td>

            <td th:text="'₹' + ${item.pizza.price}"></td>

            <td>
                <div class="d-flex align-items-center gap-2">

                    <form th:action="@{/decrease/{id}(id=${item.id})}"
                          method="post">
                        <button type="submit"
                                class="btn btn-sm btn-warning">
                            -
                        </button>
                    </form>

                    <span class="fw-bold px-2"
                          th:text="${item.quantity}">
                    </span>

                    <form th:action="@{/increase/{id}(id=${item.id})}"
                          method="post">
                        <button type="submit"
                                class="btn btn-sm btn-success">
                            +
                        </button>
                    </form>

                </div>
            </td>

            <td th:text="'₹' + ${item.itemTotal}"></td>

            <td>
                <form th:action="@{/cart/remove}" method="post">
                    <input type="hidden"
                           name="cartItemId"
                           th:value="${item.id}" />

                    <button class="btn btn-sm btn-danger"
                            type="submit">
                        <i class="bi bi-trash"></i> Remove
                    </button>
                </form>
            </td>

        </tr>

        </tbody>

    </table>

    <!-- Coupon Form -->
    <div th:if="${!#lists.isEmpty(cart.cartItems)}"
         class="row mt-4">

        <div class="col-md-6">

            <form th:action="@{/cart/apply-coupon}" method="post">

                <div class="input-group">

                    <input type="text"
                           class="form-control"
                           name="couponCode"
                           placeholder="Enter Coupon Code"
                           required>

                    <button class="btn btn-primary"
                            type="submit">
                        Apply Coupon
                    </button>

                </div>

            </form>

        </div>

    </div>

    
    <div class="d-flex justify-content-end mt-4"
     th:if="${!#lists.isEmpty(cart.cartItems)}">

    <div class="card p-4" style="min-width:350px;">

        <h4 class="mb-3">Order Summary</h4>

        <div class="d-flex justify-content-between mb-2">
            <span>Subtotal</span>
            <span th:text="'₹' + ${subtotal}"></span>
        </div>

        <div class="d-flex justify-content-between mb-2">
            <span>Discount</span>
            <span class="text-success"
                  th:text="'- ₹' + ${discount}">
            </span>
        </div>

        <hr>
        
        <div class="d-flex justify-content-between fw-bold fs-5">
            <span>Grand Total</span>
            <span class="text-success"
                  th:text="'₹' + ${grandTotal}">
            </span>
        </div>
        <hr>
        <div class="d-grid mt-3">
    <a th:href="@{/orders/checkout}"
       class="btn btn-success btn-lg">
        <i class="bi bi-bag-check"></i>
        Proceed to Checkout
    </a>
</div>
        

    </div>

</div>

</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
