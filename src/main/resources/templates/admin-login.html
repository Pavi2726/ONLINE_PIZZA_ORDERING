<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head('Admin Login')}"></head>
<body class="admin-login-bg">

<section class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock-fill text-danger" style="font-size:3rem;"></i>
                    <h3 class="fw-bold mt-2">Admin Login</h3>
                    <p class="text-muted small mb-0">Pizza management access only</p>
                </div>

                <div th:replace="~{fragments/admin-layout :: alerts}"></div>

                <form th:action="@{/admin/login}" th:object="${loginRequest}" method="post" novalidate>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{email}"></div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-key"></i></span>
                            <input type="password" class="form-control" th:field="*{password}"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{password}"></div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </button>
                </form>

                <div class="text-center mt-3">
                    <a th:href="@{/}" class="small text-muted"><i class="bi bi-arrow-left"></i> Back to site</a>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/admin-layout :: scripts}"></div>
</body>
</html>
