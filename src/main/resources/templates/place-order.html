<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Place Order')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<section class="container my-5">
    <div class="row g-4 justify-content-center">
        <!-- Pizza summary -->
        <div class="col-12 col-lg-4">
            <div class="card shadow-sm">
                <img th:src="${pizza.imageUrl}" class="card-img-top pizza-img" th:alt="${pizza.name}"
                     onerror="this.src='https://via.placeholder.com/400x250?text=Pizza';">
                <div class="card-body">
                    <h5 class="fw-semibold" th:text="${pizza.name}">Pizza</h5>
                    <span class="badge bg-light text-dark border mb-2" th:text="${pizza.category}">Category</span>
                    <p class="small text-muted" th:text="${pizza.description}">Description</p>
                    <p class="fw-bold text-danger mb-0">
                        Unit price: ₹<span th:text="${#numbers.formatInteger(pizza.price, 1)}">0</span>
                    </p>
                </div>
            </div>
        </div>

        <!-- Order form -->
        <div class="col-12 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="fw-bold mb-4"><i class="bi bi-bag-check"></i> Place Your Order</h2>

                    <form th:action="@{/orders}" th:object="${orderDTO}" method="post" novalidate
                          th:attr="data-unit-price=${pizza.price},data-tax-rate=0.08" id="orderForm">
                        <input type="hidden" th:field="*{pizzaId}">

                        <div class="mb-3">
                            <label class="form-label">Quantity</label>
                            <input type="number" min="1" max="50" class="form-control" id="quantity"
                                   th:field="*{quantity}"
                                   th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{quantity}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Delivery Address</label>
                            <textarea class="form-control" rows="2" th:field="*{deliveryAddress}"
                                      th:classappend="${#fields.hasErrors('deliveryAddress')} ? 'is-invalid'"></textarea>
                            <div class="invalid-feedback" th:errors="*{deliveryAddress}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" class="form-control" th:field="*{phone}"
                                   th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{phone}"></div>
                        </div>

                        <!-- Live total -->
                        <div class="bg-light rounded p-3 mb-3">
                            <div class="d-flex justify-content-between">
                                <span>Subtotal</span><span>₹<span id="subtotal">0</span></span>
                            </div>
                            <div class="d-flex justify-content-between">
                                <span>Tax (8%)</span><span>₹<span id="tax">0</span></span>
                            </div>
                            <hr class="my-2">
                            <div class="d-flex justify-content-between fw-bold fs-5">
                                <span>Grand Total</span><span class="text-danger">₹<span id="grandTotal">0</span></span>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-danger w-100" id="confirmOrderBtn">
                            <span class="spinner-border spinner-border-sm d-none" role="status"></span>
                            <i class="bi bi-check2-circle"></i> Confirm Order
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
